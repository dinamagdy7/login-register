<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleproject.css">
    <title>login form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>
    <h1 class="title">Minimal Login Form</h1>
    <div class="main-wrapper">



        <div class="main">

            <div class="container">
                <form>
                    <div class="input-box">
                        <label>Email</label>
                        <input type="email" placeholder="Enter your Email">
                    </div>
                    <div class="input-box">
                        <label>Password</label>
                        <input type="password" placeholder="Password">
                    </div>
                    <button type="submit">Login Now</button>
                </form>
            </div>
            <div class="right">
                <h3>Or login with</h3>
                <a href="https://www.facebook.com/" class="social facebook">
                    <i class="fab fa-facebook-f"></i> Login with Facebook
                </a>
                <a href="https://x.com/" class="social twitter">
                    <i class="fab fa-twitter"></i> Login with Twitter
                </a>
                <p>Not yet registered? <a href="registerproject.html">Sign up</a></p>
            </div>
        </div>

</body>

</html>
